name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: python3 -m unittest discover -s tests -v

  self-scan:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dogfood shipcheck on this repo
        run: |
          python3 scripts/rules.py . > findings.json
          python3 - <<'EOF'
          import json
          d = json.load(open("findings.json"))
          outside = [f for f in d["findings"] if not f["path"].startswith("demo/")]
          for f in outside:
              print("UNEXPECTED:", f)
          assert not outside, "shipcheck found issues in its own infra files"
          print("self-scan clean — all findings confined to demo/ fixtures")
          EOF
